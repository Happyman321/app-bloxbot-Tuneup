name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Download OpenCode binary
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Invoke-WebRequest -Uri "https://github.com/anomalyco/opencode/releases/latest/download/opencode-windows-x64.zip" -OutFile "opencode.zip"
          Expand-Archive -Path "opencode.zip" -DestinationPath "opencode-extracted" -Force
          Move-Item -Path "opencode-extracted/opencode.exe" -Destination "src-tauri/binaries/opencode-x86_64-pc-windows-msvc.exe" -Force

      - name: Download bundled Node.js
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/resources/nodejs/bin"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.19.5/node-v20.19.5-win-x64.zip" -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "node-extracted" -Force
          $nodeFolder = Get-ChildItem "node-extracted" | Select-Object -First 1
          Copy-Item -Path "$($nodeFolder.FullName)\*" -Destination "src-tauri/resources/nodejs/bin" -Recurse -Force

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: Release for ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
